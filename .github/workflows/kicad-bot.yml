name: kicad-bot

on:
  push:
    branches: [main]
  pull_request:

jobs:
  kicad-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: embedded-pro/kicad-bot@dbe30bb6e70872d2a0dbf5b006e42442ce434c95 # v0.1.3
        with:
          run-verify: "true"
          run-diff: "true"
          run-fab: "true"
          fail-on-erc: "true"
          fail-on-drc: "true"
