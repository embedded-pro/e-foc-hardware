name: kicad-bot

on:
  push:
    branches: [main]
    paths: ["**.kicad_sch", "**.kicad_pcb"]
  pull_request:
    paths: ["**.kicad_sch", "**.kicad_pcb"]

jobs:
  kicad-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: embedded-pro/kicad-bot@v0
        with:
          run-verify: "true"
          run-diff: "true"
          run-fab: "true"
          fail-on-erc: "true"
          fail-on-drc: "true"
